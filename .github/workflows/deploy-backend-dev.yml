name: Deploy Dev Apps

on:
  push:
    branches:
      - dev
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy-backend-dev.yml"
  workflow_dispatch:

concurrency:
  group: deploy-dev-apps
  cancel-in-progress: true

env:
  FRONTEND_APP_NAME: shopbot-dev-fe
  FRONTEND_PACKAGE_PATH: ./frontend
  NODE_VERSION: "20"
  BACKEND_APP_NAME: shopbot-dev-be
  BACKEND_PACKAGE_PATH: ./backend
  PYTHON_VERSION: "3.11"

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy frontend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FE }}
          package: ${{ env.FRONTEND_PACKAGE_PATH }}

  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify backend imports
        working-directory: backend
        run: python -m compileall app

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BE }}
          package: ${{ env.BACKEND_PACKAGE_PATH }}
